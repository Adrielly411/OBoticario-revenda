<!doctype html>
<html xmlns="http://www.thymeleaf.org" lang="pt">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Criar Produto</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/navbar/navbar.css}">
    <link rel="stylesheet" th:href="@{/footer/footer.css}">
    <link rel="stylesheet" href="/admin/create-product/create-product.css">
    <script src="https://kit.fontawesome.com/821ff5176a.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <section th:insert="~{admin/navbar :: nav}"></section>

    <main class="container d-flex justify-content-center">
        <form th:action="@{/admin/criar-produto}" th:object="${productRequestDto}" method="post" enctype="multipart/form-data">
            <div class="mb-5">
                <label for="name" class="form-label">Nome</label>
                <input name="name" type="text" class="form-control" id="name">
                <div th:if="${#fields.hasErrors('name')}" th:errors="*{name}" class="text-danger"></div>
            </div>
            <div class="mb-5">
                <label for="price" class="form-label">Preço original</label>
                <input name="price" type="number" step="any" class="form-control" id="price">
                <div th:if="${#fields.hasErrors('price')}" th:errors="*{price}" class="text-danger"></div>
            </div>
            <div class="mb-5">
                <label for="discountedPrice" class="form-label">Preço com desconto</label>
                <input name="discountedPrice" type="number" step="any" class="form-control" id="discountedPrice">
                <div th:if="${#fields.hasErrors('discountedPrice')}" th:errors="*{discountedPrice}" class="text-danger"></div>
            </div>
            <div class="mb-5">
                <label for="quantity" class="form-label">Quantidade</label>
                <input name="quantity" type="number" class="form-control" id="quantity">
                <div th:if="${#fields.hasErrors('quantity')}" th:errors="*{quantity}" class="text-danger"></div>
            </div>
            <div class="mb-5">
                <label for="gender" class="form-label">Gênero</label>
                <select class="form-select" name="gender" id="gender" aria-label="Default select example">
                    <option selected>Selecione o gênero</option>
                    <option value="MALE">Masculino</option>
                    <option value="FEMALE">Feminino</option>
                </select>
                <div th:if="${#fields.hasErrors('gender')}" th:errors="*{gender}" class="text-danger"></div>
            </div>
            <div class="mb-5">
                <label for="imageFile" class="form-label">Foto do produto</label>
                <input name="imageFile" class="form-control" type="file" id="imageFile">
                <div th:if="${#fields.hasErrors('imageFile')}" th:errors="*{imageFile}" class="text-danger"></div>
            </div>     
            <button type="submit" class="btn btn-success">Criar</button>
        </form>
    </main>

    <section th:insert="~{footer :: footer}"></section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
