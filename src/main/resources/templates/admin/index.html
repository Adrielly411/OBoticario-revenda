<!doctype html>
<html xmlns="http://www.thymeleaf.org" lang="pt">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/navbar/navbar.css}">
    <link rel="stylesheet" th:href="@{/footer/footer.css}">
    <link rel="stylesheet" href="/admin/index/index.css">
    <script src="https://kit.fontawesome.com/821ff5176a.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <section th:insert="~{admin/navbar :: nav}"></section>

    <div class="modal fade" th:if="${openErrorModal}" id="errorModal" tabindex="-1" aria-labelledby="errorModalLabel" aria-hidden="true">
      <div class="modal-dialog modal-dialog-centered">
        <div class="modal-content">
        <div class="modal-header bg-danger text-white">
            <h5 class="modal-title" id="errorModalLabel">Houve um erro</h5>
            <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal" aria-label="Close"></button>
        </div>
        <div class="modal-body">
            <p th:text="${errorMessage}"></p>
        </div>
        <div class="modal-footer">
            <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">Fechar</button>
        </div>
        </div>
      </div>
    </div>

    <main class="container">
      <section class="mb-3">
        <div>
          <form th:action="@{/admin}" method="get" class="d-flex gap-2">
            <div class="me-auto d-flex col-8">
              <input class="search-form form-control me-2" name="nameFilter" type="search" th:value="*{nameFilter}" placeholder="Pesquisar produto" aria-label="Search"/>
              <button class="btn btn-outline-success me-2" type="submit"><i class="fa-solid fa-magnifying-glass"></i></button>
              <a class="btn btn-outline-danger" type="submit" th:href="@{/admin}"><i class="fa-solid fa-trash"></i></a>
            </div>

            <div class="btn-group col-4" role="group">
              <button type="button" class="btn btn-success rounded-3" data-bs-toggle="dropdown">
                <i class="fa-solid fa-sliders"></i> Filtros
              </button>
              <ul class="dropdown-menu">
                <li><button class="dropdown-item" type="submit" name="filter" value="MALE">Masculino</button></li>
                <li><button class="dropdown-item" type="submit" name="filter" value="FEMALE">Feminino</button></li>
                <li><button class="dropdown-item" type="submit" name="filter" value="higherPrice">Maior preço</button></li>
                <li><button class="dropdown-item" type="submit" name="filter" value="lowerPrice">Menor preço</button></li>
                <li><button class="dropdown-item" type="submit" name="filter" value="higherDiscount">Maior desconto</button></li>
                <li><button class="dropdown-item" type="submit" name="filter" value="higherQuantity">Maior quantidade</button></li>
                <li><button class="dropdown-item" type="submit" name="filter" value="lowerQuantity">Menor quantidade</button></li>
                <li><a class="dropdown-item" type="submit" th:href="@{/admin}">Resetar filtro</a></li>
              </ul>
            </div>
          </form>
        </div>
      </section>

      <section class="row row-cols-1 row-cols-lg-3 g-4">
        <div class="col without-products mx-auto text-center" th:if="${#lists.isEmpty(productPage)}">
          <h5 class="text-dark">Nenhum produto encontrado</h5>
        </div>

        <div class="col" th:if="${!#lists.isEmpty(productPage)}" th:each="product : ${productPage.content}">
          <div th:if="${product.quantity} > 0" class="card h-100 shadow-lg border-0">
            <div class="position-relative">
              <img th:src="${product.imageUrl}" class="card-img-top">
              <span class="badge bg-danger position-absolute top-0 start-0 m-2 fs-6" th:text="|- ${product.discountPercentage}%|">
                Porcentagem do desconto
              </span>
            </div>

            <div class="card-body d-flex flex-column justify-content-between">
              <div>
                <h5 class="card-title text-dark fw-semibold mb-2" th:text="${product.name}">Nome do Produto</h5>
              </div>

              <div class="mt-3">
                <small class="fs-4 text-muted text-decoration-line-through d-block mb-1" th:text="|R$ ${#numbers.formatDecimal(product.price, 1, 'POINT', 2, 'COMMA')}|">
                  Preço do produto
                </small>
                
                <div class="d-flex align-items-baseline gap-2 mb-3">
                  <span class="fs-4 fw-bold text-success" th:text="|R$ ${#numbers.formatDecimal(product.discountedPrice, 1, 'POINT', 2, 'COMMA')}|">
                    Preço com desconto
                  </span>
                </div>
                
                <div class="d-flex align-items-baseline gap-2 mb-3">
                  <span class="fs-5 fw-bold" th:text="|Quantidade: ${product.quantity}|">
                    Quantidade
                  </span>
                </div>

                <div class="d-grid gap-2 mx-auto">
                    <a class="btn btn-success" th:href="@{admin/editar-produto(id=${product.id})}" role="button">Editar</a>
                    <button class="delete-button btn btn-danger" th:data-url="@{/admin/deletar-produto(id=${product.id})}">Excluir</button>
                </div>
              </div>
            </div>
          </div>

          <div th:if="${product.quantity} == 0" class="card-sold-out card h-100 shadow-lg border-0">
            <div class="position-relative">
              <img th:src="${product.imageUrl}" class="img-greyed card-img-top">
              <span class="badge bg-danger position-absolute top-0 start-0 m-2 fs-6" th:text="|- ${product.discountPercentage}%|">
                Porcentagem do desconto
              </span>
              <div class="position-absolute bottom-0 w-100 bg-dark bg-opacity-75 text-white text-center fs-3 py-2 fw-bold fs-5">
                Fora de estoque
              </div>
            </div>

            <div class="card-body d-flex flex-column justify-content-between">
              <div>
                <h5 class="card-title text-dark fw-semibold mb-2" th:text="${product.name}">Nome do Produto</h5>
              </div>

              <div class="mt-3">
                <small class="fs-4 text-muted text-decoration-line-through d-block mb-1" th:text="|R$ ${#numbers.formatDecimal(product.price, 1, 'POINT', 2, 'COMMA')}|">
                  Preço do produto
                </small>
                
                <div class="d-flex align-items-baseline gap-2 mb-3">
                  <span class="fs-4 fw-bold text-success" th:text="|R$ ${#numbers.formatDecimal(product.discountedPrice, 1, 'POINT', 2, 'COMMA')}|">
                    Preço com desconto
                  </span>
                </div>
                
                <div class="d-flex align-items-baseline gap-2 mb-3">
                  <span class="fs-5 fw-bold" th:text="|Quantidade: ${product.quantity}|">
                    Quantidade
                  </span>
                </div>

                <div class="d-grid gap-2 mx-auto">
                    <a class="btn btn-success" th:href="@{admin/editar-produto(id=${product.id})}" role="button">Editar</a>
                    <button class="delete-button btn btn-danger" th:data-url="@{/admin/deletar-produto(id=${product.id})}">Excluir</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>

      <nav class="mt-5" th:if="${productPage.totalPages > 0}">
        <ul class="pagination justify-content-center">

          <li class="page-item" th:classappend="${productPage.first} ? 'disabled'">
            <a class="page-link" th:href="@{/admin(size=${productPage.size}, page=1, filter=${param.filter}, nameFilter=${param.nameFilter})}" aria-label="Primeira">
              <span aria-hidden="true">&laquo;&laquo;</span>
            </a>
          </li>

          <li class="page-item" th:classappend="${!productPage.hasPrevious()} ? 'disabled'">
            <a class="page-link" th:href="@{/admin(size=${productPage.size}, page=${productPage.number}, filter=${param.filter}, nameFilter=${param.nameFilter})}" aria-label="Anterior">
              <span aria-hidden="true">&laquo;</span>
            </a>
          </li>

          <li class="page-item" 
              th:each="pageNumber : ${pageNumbers}" 
              th:if="${pageNumber >= productPage.number and pageNumber <= productPage.number + 2}"
              th:classappend="${pageNumber == productPage.number + 1} ? 'active'">
            <a class="page-link" 
              th:text="${pageNumber}" 
              th:href="@{/admin(size=${productPage.size}, page=${pageNumber}, filter=${param.filter}, nameFilter=${param.nameFilter})}">1</a>
          </li>

          <li class="page-item" th:classappend="${!productPage.hasNext()} ? 'disabled'">
            <a class="page-link" th:href="@{/admin(size=${productPage.size}, page=${productPage.number + 2}, filter=${param.filter}, nameFilter=${param.nameFilter})}" aria-label="Próxima">
              <span aria-hidden="true">&raquo;</span>
            </a>
          </li>

          <li class="page-item" th:classappend="${productPage.last} ? 'disabled'">
            <a class="page-link" th:href="@{/admin(size=${productPage.size}, page=${productPage.totalPages}, filter=${param.filter}, nameFilter=${param.nameFilter})}" aria-label="Última">
              <span aria-hidden="true">&raquo;&raquo;</span>
            </a>
          </li>

        </ul>
      </nav>

    </main>

    <section th:insert="~{footer :: footer}"></section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="/admin/index/index.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <script th:if="${openErrorModal}">
      document.addEventListener("DOMContentLoaded", function() {
        var myModal = new bootstrap.Modal(document.getElementById('errorModal'));
        myModal.show();
      });
    </script>
  </body>
</html>
