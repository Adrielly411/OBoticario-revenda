<!doctype html>
<html lang="pt">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Relatórios - Painel Administrativo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Pinyon+Script&display=swap" rel="stylesheet">
    <link rel="stylesheet" th:href="@{/navbar/navbar.css}">
    <link rel="stylesheet" th:href="@{/footer/footer.css}">
    <link rel="stylesheet" href="/admin/report/report.css">
    
    <script src="https://kit.fontawesome.com/821ff5176a.js" crossorigin="anonymous"></script>
  </head>
  <body>
    <section th:insert="~{admin/navbar :: nav}"></section>

    <main class="container py-5">
        
        <div class="row justify-content-center">
            <div class="col-md-10">
                <h2 class="mb-4 text-dark fw-semibold text-center text-md-start">Painel de Relatórios</h2>
                
                <ul class="nav nav-tabs mb-4" id="reportTabs" role="tablist">
                    <li class="nav-item" role="presentation">
                        <button class="nav-link active text-dark fw-medium" id="usuarios-tab" data-bs-toggle="tab" data-bs-target="#usuarios-pane" type="button" role="tab" aria-controls="usuarios-pane" aria-selected="true">
                            <i class="fa-solid fa-users me-2 text-success"></i>Relatório de Usuários
                        </button>
                    </li>
                    <li class="nav-item" role="presentation">
                        <button class="nav-link text-dark fw-medium" id="produtos-tab" data-bs-toggle="tab" data-bs-target="#produtos-pane" type="button" role="tab" aria-controls="produtos-pane" aria-selected="false">
                            <i class="fa-solid fa-box-open me-2 text-success"></i>Relatório de Produtos
                        </button>
                    </li>
                </ul>

                <div class="tab-content" id="reportTabsContent">
                    
                    <div class="tab-pane fade show active" id="usuarios-pane" role="tabpanel" aria-labelledby="usuarios-tab" tabindex="0">
                        <div class="row row-cols-1 row-cols-md-3 g-4">
                            
                            <div class="col">
                                <div class="card h-100 shadow-sm border-0 text-center p-3">
                                    <div class="card-body">
                                        <div class="mb-2"><i class="fa-solid fa-eye fs-3 icon-view"></i></div>
                                        <h6 class="card-subtitle mb-2 text-muted text-uppercase">Acessos no Site</h6>
                                        <h2 class="card-title fw-bold text-dark mt-3">1.240</h2>
                                    </div>
                                </div>
                            </div>

                            <div class="col">
                                <div class="card h-100 shadow-sm border-0 text-center p-3">
                                    <div class="card-body">
                                        <div class="mb-2"><i class="fa-brands fa-instagram fs-3 icon-instagram"></i></div>
                                        <h6 class="card-subtitle mb-2 text-muted text-uppercase">Cliques no Instagram</h6>
                                        <h2 class="card-title fw-bold text-dark mt-3">342</h2>
                                    </div>
                                </div>
                            </div>

                            <div class="col">
                                <div class="card h-100 shadow-sm border-0 text-center p-3">
                                    <div class="card-body">
                                        <div class="mb-2"><i class="fa-brands fa-whatsapp fs-3 icon-whatsapp"></i></div>
                                        <h6 class="card-subtitle mb-2 text-muted text-uppercase">Cliques no WhatsApp</h6>
                                        <h2 class="card-title fw-bold text-dark mt-3">518</h2>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>

                    <div class="tab-pane fade" id="produtos-pane" role="tabpanel" aria-labelledby="produtos-tab" tabindex="0">
                        <div class="row row-cols-1 row-cols-md-3 g-4">
                            
                            <div class="col">
                                <div class="card h-100 shadow-sm border-0 text-center p-3">
                                    <div class="card-body">
                                        <div class="mb-2"><i class="fa-solid fa-tags fs-3"></i></div>
                                        <h6 class="card-subtitle mb-2 text-muted text-uppercase">Produtos Cadastrados</h6>
                                        <h2 class="card-title fw-bold text-dark mt-3">84</h2>
                                    </div>
                                </div>
                            </div>

                        </div>
                    </div>

                </div>

            </div>
        </div>

    </main>   

    <section th:insert="~{footer :: footer}"></section>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
